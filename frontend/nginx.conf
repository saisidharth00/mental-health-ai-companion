server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    location /chat {
        proxy_pass http://backend:5000/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://backend:5000/health;
    }
}
